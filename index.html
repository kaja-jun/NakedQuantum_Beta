<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="NakedQuantum">
<link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NakedQuantum v0.10</title>
<style>
:root {
  --bg: #000000;        /* Absolute Void */
  --surface: #0a0a0a;   /* Deep Shadow */
  --surface2: #111111;  /* Lighter Shadow */
  --border: #1f1f1f;    /* Stealth Border */
  --accent: #c8a050;    /* The Gold Firefly */
  --accent-dim: #8a6e35;
  --text: #ccc5b9;      /* Bone White */
  --muted: #6b6560;
  --danger: #8a3030;
  --font-serif: Georgia, serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, sans-serif;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

/* --- THE VOID NAVIGATION --- */
.nq-header {
  height: 56px;
  background: #000;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 1000;
}

.nq-wordmark {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent);
  font-weight: 900;
  text-transform: uppercase;
  opacity: 0.8;
}

.nav-toggle {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px;
}

.nav-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 18px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.nav-btn.active {
  background: var(--accent);
  color: #000;
}

/* --- VIEW SYSTEM --- */
.view-host {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.view-panel {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
  will-change: transform, opacity;
}

.view-panel.hidden {
  transform: translateX(50px);
  opacity: 0;
  pointer-events: none;
}

/* --- COMPONENT STYLES (Skeletal) --- */
.soup-view, .sanctuary-view {
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.placeholder-center {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  text-align: center;
  padding: 40px;
  opacity: 0.5;
}

.placeholder-center h1 {
  font-family: var(--font-serif);
  font-size: 24px;
  color: var(--accent);
  margin-bottom: 10px;
}

/* --- UTILS --- */
.header-icon-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--accent);
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  cursor: pointer;
}

#cosm-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #000;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 900;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="nq-header">
  <div class="nq-wordmark">NakedQuantum</div>
  
  <div class="nav-toggle">
    <button class="nav-btn active" id="btn-mode-soup">Soup</button>
    <button class="nav-btn" id="btn-mode-sanctuary">Sanctuary</button>
  </div>

  <div style="display:flex; gap:8px;">
    <button class="header-icon-btn" id="btn-sync" title="Akashic Sync">∞</button>
    <button class="header-icon-btn" id="btn-search" title="Global Search">⌖</button>
  </div>
</div>

<div class="view-host">
  <!-- STATE 1: THE SOUP (Archive) -->
  <div class="view-panel soup-view" id="view-soup">
    <div class="placeholder-center">
      <h1>The Soup</h1>
      <p>The boundless dark container.<br>Awaiting the firefly.</p>
    </div>
  </div>

  <!-- STATE 2: THE SANCTUARY (Encounter) -->
  <div class="view-panel sanctuary-view hidden" id="view-sanctuary">
    <div class="placeholder-center">
      <h1>The Sanctuary</h1>
      <p>The energetic spring.<br>Enter the encounter.</p>
    </div>
  </div>
</div>

<div id="cosm-toast"></div>

<script>
/* --- STATE MANAGEMENT --- */
let currentMode = 'soup';
let db = null;

/* --- DB INITIALIZATION --- */
const dbReq = indexedDB.open("NakedQuantumDB", 1);

dbReq.onupgradeneeded = (e) => {
  const d = e.target.result;
  // The Archive Stores
  if (!d.objectStoreNames.contains("folders")) d.createObjectStore("folders", { keyPath: "id" });
  if (!d.objectStoreNames.contains("discourses")) {
    const disc = d.createObjectStore("discourses", { keyPath: "id" });
    disc.createIndex("folder_id", "folder_id", { unique: false });
  }
  if (!d.objectStoreNames.contains("mosaic")) d.createObjectStore("mosaic", { keyPath: "id" });
  
  // The Encounter Stores
  if (!d.objectStoreNames.contains("lenses")) d.createObjectStore("lenses", { keyPath: "id" });
  if (!d.objectStoreNames.contains("chat_history")) {
    const hist = d.createObjectStore("chat_history", { keyPath: "id", autoIncrement: true });
    hist.createIndex("lens_id", "lens_id", { unique: false });
  }
  
  // The Watcher Store
  if (!d.objectStoreNames.contains("watcher_logs")) d.createObjectStore("watcher_logs", { keyPath: "id" });
};

dbReq.onsuccess = (e) => {
  db = e.target.result;
  console.log("Sovereign DB Initialized.");
};

/* --- VIEW SWITCHER --- */
function switchMode(mode) {
  const soup = document.getElementById('view-soup');
  const sanctuary = document.getElementById('view-sanctuary');
  const btnSoup = document.getElementById('btn-mode-soup');
  const btnSanctuary = document.getElementById('btn-mode-sanctuary');

  currentMode = mode;

  if (mode === 'soup') {
    soup.classList.remove('hidden');
    sanctuary.classList.add('hidden');
    btnSoup.classList.add('active');
    btnSanctuary.classList.remove('active');
  } else {
    soup.classList.add('hidden');
    sanctuary.classList.remove('hidden');
    btnSoup.classList.remove('active');
    btnSanctuary.classList.add('active');
  }
}

document.getElementById('btn-mode-soup').onclick = () => switchMode('soup');
document.getElementById('btn-mode-sanctuary').onclick = () => switchMode('sanctuary');

/* --- UTILS --- */
function showToast(msg) {
  const t = document.getElementById('cosm-toast');
  t.textContent = msg;
  t.style.opacity = "1";
  setTimeout(() => { t.style.opacity = "0"; }, 2000);
}

document.getElementById('btn-sync').onclick = () => showToast("Akashic Sync Initiated...");
document.getElementById('btn-search').onclick = () => showToast("Searching the Void...");

</script>
</body>
</html>
