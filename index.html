<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="NakedQuantum">
<link rel="manifest" href="/manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NakedQuantum Beta v0.11</title>
<style>
:root {
  --bg: #000000;
  --surface: #0a0a0a;
  --surface2: #111111;
  --border: #1f1f1f;
  --accent: #c8a050;
  --accent-dim: #8a6e35;
  --text: #ccc5b9;
  --muted: #6b6560;
  --danger: #8a3030;
  --font-serif: Georgia, serif;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, sans-serif;
  margin: 0;
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
}

button { cursor: pointer; -webkit-appearance: none; appearance: none; touch-action: manipulation; }
button:active { opacity: 0.7; transform: scale(0.97); transition: transform 0.08s ease; }

/* --- HEADER & NAV --- */
.nq-header {
  height: 56px;
  background: #000;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  z-index: 1000;
  flex-shrink: 0;
}
.nq-wordmark {
  font-size: 11px;
  letter-spacing: 3px;
  color: var(--accent);
  font-weight: 900;
  text-transform: uppercase;
  opacity: 0.8;
}
.nav-toggle {
  display: flex;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2px;
}
.nav-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 18px;
  cursor: pointer;
  transition: all 0.3s ease;
}
.nav-btn.active {
  background: var(--accent);
  color: #000;
}
.header-icon-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--accent);
  width: 36px;
  height: 36px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

/* --- VIEW SYSTEM --- */
.view-host {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.view-panel {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
  will-change: transform, opacity;
}
.view-panel.hidden {
  transform: translateX(50px);
  opacity: 0;
  pointer-events: none;
}

/* --- THE SOUP (LEDGER) --- */
.soup-view {
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}
.breadcrumb-bar {
  display: flex;
  align-items: center;
  padding: 14px 16px 8px;
  overflow-x: auto;
  scrollbar-width: none;
}
.breadcrumb-bar::-webkit-scrollbar { display: none; }
.breadcrumb-btn {
  background: none;
  border: none;
  color: var(--muted);
  font-size: 11px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  font-weight: 700;
  padding: 4px 6px;
  border-radius: 6px;
  white-space: nowrap;
}
.breadcrumb-btn.current { color: var(--accent); opacity: 0.9; }
.breadcrumb-arrow { color: var(--muted); font-size: 10px; opacity: 0.5; padding: 0 2px; }

.table-action-bar {
  display: flex;
  gap: 10px;
  padding: 10px 16px 14px;
}
.btn-table-action {
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--accent);
  border: 1px solid var(--border);
  color: #000;
  font-size: 12px;
  font-weight: 700;
  padding: 10px 16px;
  border-radius: 10px;
  flex: 1;
}

.search-bar-wrap { padding: 8px 16px 4px; }
.search-input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 14px;
  border-radius: 10px;
  font-size: 14px;
  outline: none;
}

.soup-surface { padding: 0 16px 100px; }
.section-label {
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--accent);
  opacity: 0.45;
  font-weight: 900;
  text-transform: uppercase;
  padding: 14px 0 8px;
}
.cards-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.folder-card, .discourse-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.18s;
  position: relative;
  overflow: hidden;
}
.folder-card:active, .discourse-card:active { border-color: var(--accent); background: var(--surface2); }
.card-name { font-size: 13px; font-weight: 700; color: var(--text); margin-top: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-meta { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* --- LIGHTHOUSE EDITOR (Inside Soup) --- */
.lighthouse-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg);
  z-index: 2000;
  display: none;
  flex-direction: column;
  overflow: hidden;
}
.lighthouse-overlay.active { display: flex; }
.lh-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
}
.btn-back {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  padding: 7px 12px;
  border-radius: 8px;
}

.lh-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.lh-inner { max-width: 680px; width: 100%; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
.lh-title {
  width: 100%;
  background: none;
  border: none;
  border-bottom: 1px solid var(--border);
  color: var(--text);
  font-size: 22px;
  font-weight: 700;
  padding: 6px 0 12px;
  outline: none;
  font-family: var(--font-serif);
}

.format-toolbar {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 8px 4px;
  overflow-x: auto;
  scrollbar-width: none;
  border-bottom: 1px solid var(--border);
  margin-bottom: 12px;
}
.format-toolbar::-webkit-scrollbar { display: none; }
.fmt-btn {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  padding: 5px 10px;
  border-radius: 7px;
  white-space: nowrap;
  font-family: var(--font-serif);
}
.fmt-btn:active { background: var(--surface2); color: var(--accent); }
.fmt-divider { width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

.content-textarea {
  width: 100%;
  min-height: 320px;
  background: var(--surface);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  font-size: 15px;
  line-height: 1.8;
  outline: none;
  resize: none;
  font-family: var(--font-serif);
}

.content-view {
  display: none;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  font-size: 15px;
  line-height: 1.8;
  font-family: var(--font-serif);
  color: var(--text);
}

/* --- THE SANCTUARY (Chat) --- */
.sanctuary-view {
  background: var(--bg);
  display: flex;
  flex-direction: column;
}
.chat-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.lens-select {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--accent);
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  outline: none;
}
.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.msg { max-width: 85%; padding: 12px 16px; border-radius: 15px; font-size: 15px; line-height: 1.5; }
.user-msg { align-self: flex-end; background: var(--surface2); color: var(--accent); border: 1px solid var(--border); }
.bot-msg { align-self: flex-start; background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.chat-input-area {
  padding: 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
}
.chat-input {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px;
  border-radius: 10px;
  outline: none;
}
.btn-send {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 0 20px;
  border-radius: 10px;
  font-weight: 900;
}

/* --- MODALS & OVERLAYS --- */
.cosm-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.8);
  z-index: 3000;
  display: none;
  backdrop-filter: blur(4px);
}
.cosm-modal {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--surface);
  border-top: 1px solid var(--border);
  border-radius: 18px 18px 0 0;
  padding: 20px;
  z-index: 3001;
  display: none;
  flex-direction: column;
  gap: 12px;
}
.cosm-modal.visible { display: flex; }
.modal-title { font-size: 11px; letter-spacing: 3px; color: var(--accent); font-weight: 900; text-transform: uppercase; }
.cosm-input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px;
  border-radius: 10px;
  outline: none;
}
.modal-buttons { display: flex; gap: 10px; }
.modal-btn { flex: 1; padding: 14px; border-radius: 10px; font-weight: 900; border: none; cursor: pointer; }
.btn-cancel { background: var(--surface2); color: var(--text); }
.btn-confirm { background: var(--accent); color: #000; }

#cosm-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #000;
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 900;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
}
</style>
</head>
<body>

<div class="nq-header">
  <div class="nq-wordmark">NakedQuantum</div>
  <div class="nav-toggle">
    <button class="nav-btn active" id="btn-mode-soup">Soup</button>
    <button class="nav-btn" id="btn-mode-sanctuary">Sanctuary</button>
  </div>
  <div style="display:flex; gap:8px;">
    <button class="header-icon-btn" id="btn-sync" title="Sync">∞</button>
    <button class="header-icon-btn" id="btn-search" title="Search">⌖</button>
  </div>
</div>

<div class="view-host">
  <!-- STATE 1: THE SOUP -->
  <div class="view-panel soup-view" id="view-soup">
    <div class="breadcrumb-bar" id="breadcrumb-bar"></div>
    <div class="table-action-bar">
      <button class="btn-table-action" id="btn-new-disc">+ New Fragment</button>
    </div>
    <div class="search-bar-wrap">
      <input class="search-input" id="search-input" placeholder="Search the soup...">
    </div>
    <div class="soup-surface" id="soup-surface"></div>
  </div>

  <!-- STATE 2: THE SANCTUARY -->
  <div class="view-panel sanctuary-view hidden" id="view-sanctuary">
    <div class="chat-header">
      <span class="nq-wordmark" style="opacity:0.5;">The Encounter</span>
      <select class="lens-select" id="lens-select">
        <option value="diamond_sutra">The Diamond Sutra</option>
        <option value="silicon_sage">Silicon Sage</option>
        <option value="childhood_crush">Summer of '99</option>
        <option value="the_ant">The Ant Colony</option>
      </select>
    </div>
    <div class="chat-box" id="chat-box"></div>
    <div class="chat-input-area">
      <textarea class="chat-input" id="chat-input" placeholder="Strike into the abyss..." rows="1"></textarea>
      <button class="btn-send" id="btn-send">Send</button>
    </div>
  </div>
</div>

<!-- LIGHTHOUSE OVERLAY (Sovereign Editor) -->
<div class="lighthouse-overlay" id="lh-overlay">
  <div class="lh-nav">
    <button class="btn-back" id="btn-lh-back">← Back</button>
    <div class="lh-tools" style="display:flex; gap:8px;">
        <button class="nav-btn" id="btn-lh-write" style="background:var(--accent); color:#000;">Write</button>
        <button class="nav-btn" id="btn-lh-view">View</button>
    </div>
  </div>
  <div class="lh-scroll">
    <div class="lh-inner">
      <input class="lh-title" id="lh-title" placeholder="Untitled Fragment">
      <div class="format-toolbar" id="format-toolbar">
        <button class="fmt-btn" data-wrap="**"><b>B</b></button>
        <button class="fmt-btn" data-wrap="*"><i>I</i></button>
        <button class="fmt-btn" data-wrap="<u>"><u>U</u></button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-line="# ">H1</button>
        <button class="fmt-btn" data-line="## ">H2</button>
        <button class="fmt-btn" data-line="### ">H3</button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-line="- ">•</button>
        <button class="fmt-btn" data-line="1. ">1.</button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-wrap="> ">"</button>
        <button class="fmt-btn" data-wrap="`">`c`</button>
        <div class="fmt-divider"></div>
        <button class="fmt-btn" data-insert="\n---\n">—</button>
      </div>
      <textarea class="content-textarea" id="lh-text" placeholder="Begin writing..."></textarea>
      <div class="content-view" id="lh-view"></div>
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="cosm-overlay" id="cosm-overlay"></div>
<div class="cosm-modal" id="folder-modal">
  <div class="modal-title">New Folder</div>
  <input class="cosm-input" id="folder-name-input" placeholder="Folder name...">
  <select class="cosm-select" id="folder-parent-select"><option value="">Root</option></select>
  <div class="modal-buttons">
    <button class="modal-btn btn-cancel" id="btn-folder-cancel">Cancel</button>
    <button class="modal-btn btn-confirm" id="btn-folder-confirm">Create</button>
  </div>
</div>

<div id="cosm-toast"></div>

<script>
/* --- STATE & DB --- */
let db = null;
let currentMode = 'soup';
let currentFolderId = null;
let currentDiscourseId = null;
let breadcrumbPath = [{ id: null, name: '◈ root' }];

const dbReq = indexedDB.open("NakedQuantumDB", 1);
dbReq.onupgradeneeded = (e) => {
  const d = e.target.result;
  if (!d.objectStoreNames.contains("folders")) d.createObjectStore("folders", { keyPath: "id" });
  if (!d.objectStoreNames.contains("discourses")) {
    const disc = d.createObjectStore("discourses", { keyPath: "id" });
    disc.createIndex("folder_id", "folder_id", { unique: false });
  }
  if (!d.objectStoreNames.contains("lenses")) d.createObjectStore("lenses", { keyPath: "id" });
  if (!d.objectStoreNames.contains("chat_history")) {
    const hist = d.createObjectStore("chat_history", { keyPath: "id", autoIncrement: true });
    hist.createIndex("lens_id", "lens_id", { unique: false });
  }
};
dbReq.onsuccess = (e) => { db = e.target.result; init(); };

async function init() {
  await renderSoup();
}

/* --- NAVIGATION --- */
function switchMode(mode) {
  const soup = document.getElementById('view-soup');
  const sanctuary = document.getElementById('view-sanctuary');
  const btnSoup = document.getElementById('btn-mode-soup');
  const btnSanctuary = document.getElementById('btn-mode-sanctuary');
  currentMode = mode;
  if (mode === 'soup') {
    soup.classList.remove('hidden'); sanctuary.classList.add('hidden');
    btnSoup.classList.add('active'); btnSanctuary.classList.remove('active');
  } else {
    soup.classList.add('hidden'); sanctuary.classList.remove('hidden');
    btnSoup.classList.remove('active'); btnSanctuary.classList.add('active');
  }
}

document.getElementById('btn-mode-soup').onclick = () => switchMode('soup');
document.getElementById('btn-mode-sanctuary').onclick = () => switchMode('sanctuary');

/* --- SOUP LOGIC --- */
async function renderSoup() {
  renderBreadcrumb();
  const surface = document.getElementById('soup-surface');
  surface.innerHTML = '';
  
  const allFolders = await dbGetAll("folders");
  const allDiscourses = await dbGetAll("discourses");
  const childFolders = allFolders.filter(f => f.parent_id === currentFolderId);
  const discourses = allDiscourses.filter(d => d.folder_id === currentFolderId);

  if (childFolders.length) {
    surface.innerHTML += `<div class="section-label">Folders</div><div class="cards-grid" id="folder-grid"></div>`;
    const grid = document.getElementById('folder-grid');
    childFolders.forEach(f => {
      const card = document.createElement('div');
      card.className = 'folder-card';
      card.innerHTML = `<div class="card-name">${f.name}</div>`;
      card.onclick = () => enterFolder(f.id, f.name);
      grid.appendChild(card);
    });
  }

  if (discourses.length) {
    surface.innerHTML += `<div class="section-label">Fragments</div><div class="cards-grid" id="disc-grid"></div>`;
    const grid = document.getElementById('disc-grid');
    discourses.forEach(d => {
      const card = document.createElement('div');
      card.className = 'discourse-card';
      card.innerHTML = `<div class="card-name">${d.title}</div><div class="card-meta">${new Date(d.updated_at).toLocaleDateString()}</div>`;
      card.onclick = () => openLighthouse(d.id);
      grid.appendChild(card);
    });
  }
}

function renderBreadcrumb() {
  const bar = document.getElementById('breadcrumb-bar');
  bar.innerHTML = '';
  breadcrumbPath.forEach((seg, idx) => {
    const btn = document.createElement('button');
    btn.className = 'breadcrumb-btn' + (idx === breadcrumbPath.length - 1 ? ' current' : '');
    btn.textContent = seg.name;
    btn.onclick = () => {
      breadcrumbPath = breadcrumbPath.slice(0, idx + 1);
      currentFolderId = breadcrumbPath[breadcrumbPath.length - 1].id;
      renderSoup();
    };
    bar.appendChild(btn);
    if (idx < breadcrumbPath.length - 1) {
      const arrow = document.createElement('span');
      arrow.className = 'breadcrumb-arrow';
      arrow.textContent = '▸';
      bar.appendChild(arrow);
    }
  });
}

function enterFolder(id, name) {
  breadcrumbPath.push({ id, name });
  currentFolderId = id;
  renderSoup();
}

async function openLighthouse(id) {
  currentDiscourseId = id;
  const disc = await dbGet("discourses", id);
  document.getElementById('lh-title').value = disc.title;
  document.getElementById('lh-text').value = disc.raw_text;
  document.getElementById('lh-overlay').classList.add('active');
  setEditorMode('write');
}

/* --- EDITOR LOGIC --- */
function setEditorMode(mode) {
  const ta = document.getElementById('lh-text');
  const view = document.getElementById('lh-view');
  const btnW = document.getElementById('btn-lh-write');
  const btnV = document.getElementById('btn-lh-view');
  if (mode === 'write') {
    ta.style.display = 'block'; view.style.display = 'none';
    btnW.classList.add('active'); btnV.classList.remove('active');
  } else {
    view.innerHTML = renderContent(ta.value);
    ta.style.display = 'none'; view.style.display = 'block';
    btnW.classList.remove('active'); btnV.classList.add('active');
  }
}

document.getElementById('btn-lh-write').onclick = () => setEditorMode('write');
document.getElementById('btn-lh-view').onclick = () => setEditorMode('view');
document.getElementById('btn-lh-back').onclick = () => {
  saveCurrentDiscourse();
  document.getElementById('lh-overlay').classList.remove('active');
};

function applyFormat(cfg) {
  const ta = document.getElementById('lh-text');
  const start = ta.selectionStart, end = ta.selectionEnd;
  const val = ta.value, selected = val.slice(start, end);
  let res = '';
  if (cfg.wrap) res = cfg.wrap[0] + selected + cfg.wrap[1];
  else if (cfg.line) res = cfg.line + selected;
  else if (cfg.insert) res = cfg.insert;
  ta.value = val.slice(0, start) + res + val.slice(end);
  ta.focus();
  ta.setSelectionRange(start + res.length, start + res.length);
}

document.querySelectorAll('.fmt-btn').forEach(btn => {
  btn.onclick = () => {
    const wrap = btn.dataset.wrap;
    const line = btn.dataset.line;
    const insert = btn.dataset.insert;
    if (wrap) applyFormat({ wrap: [wrap.slice(0,1), wrap.slice(-1)] }); // Simple wrap
    else if (line) applyFormat({ line });
    else if (insert) applyFormat({ insert });
  };
});

async function saveCurrentDiscourse() {
  if (!currentDiscourseId) return;
  await dbPut("discourses", {
    id: currentDiscourseId,
    title: document.getElementById('lh-title').value || "Untitled",
    raw_text: document.getElementById('lh-text').value,
    folder_id: currentFolderId,
    updated_at: Date.now()
  });
}

/* --- DB HELPERS --- */
function dbPut(store, data) {
  return new Promise(res => {
    const tx = db.transaction(store, "readwrite");
    tx.objectStore(store).put(data).onsuccess = res;
  });
}
function dbGet(store, id) {
  return new Promise(res => {
    const tx = db.transaction(store, "readonly");
    tx.objectStore(store).get(id).onsuccess = e => res(e.target.result);
  });
}
function dbGetAll(store) {
  return new Promise(res => {
    const tx = db.transaction(store, "readonly");
    tx.objectStore(store).getAll().onsuccess = e => res(e.target.result || []);
  });
}

/* --- RENDERER --- */
function renderContent(raw) {
  if (!raw) return "";
  return raw.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
             .replace(/\*(.+?)\*/g, '<em>$1</em>')
             .replace(/^# (.+)$/gm, '<h1>$1</h1>')
             .replace(/^## (.+)$/gm, '<h2>$1</h2>')
             .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
             .replace(/\n/g, '<br>');
}

/* --- UTILS --- */
function showToast(msg) {
  const t = document.getElementById('cosm-toast');
  t.textContent = msg; t.style.opacity = "1";
  setTimeout(() => t.style.opacity = "0", 2000);
}

document.getElementById('btn-new-disc').onclick = async () => {
  const id = "d_" + Date.now();
  await dbPut("discourses", { id, title: "New Fragment", raw_text: "", folder_id: currentFolderId, updated_at: Date.now() });
  openLighthouse(id);
};

document.getElementById('btn-sync').onclick = () => showToast("Syncing with Akashic...");
document.getElementById('btn-search').onclick = () => showToast("Searching the Void...");
</script>
</body>
</html>
